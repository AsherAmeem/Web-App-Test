version: '3.9'

services:
  backend:
    build: ./backend
    container_name: webapp-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: webapp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
